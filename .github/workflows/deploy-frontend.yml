name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.17.0' # Atau versi node.js yang Anda gunakan

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build # Ini akan membuat folder dist

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Amazon S3
        # Mengunggah isi folder dist ke S3 dan menghapus file lama yang tidak terpakai
        run: aws s3 sync ./dist s3://oxysystem-akidsmaginepg --delete

      - name: Invalidate CloudFront Cache
        # Memaksa CloudFront menghapus cache lama agar user langsung melihat web versi baru
        run: aws cloudfront create-invalidation --distribution-id E8M7D3K5QR3X8 --paths "/*"